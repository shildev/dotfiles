# Mouse support (click to switch panes, scroll, resize)
set -g mouse on

# Status bar at top
set -g status-position top

# Refresh every second (for live clock)
set -g status-interval 1

# Right side: date + time
set -g status-right "#[fg=#fbf1c7,bg=#3c3836] %a %d %b %Y  #[fg=#fbf1c7,bg=#665c54]  %H:%M:%S "

# Left side: session name
set -g status-left "#[fg=#fbf1c7,bg=#d65d0e] #S "

# Colors to match your gruvbox starship theme
set -g status-style "bg=#3c3836 fg=#fbf1c7"
set -g status-right-length 50
set -g status-left-length 20

# Make window titles look clean
set -g window-status-current-format "#[fg=#3c3836,bg=#458588] #I #W "
set -g window-status-format "#[fg=#fbf1c7,bg=#3c3836] #I #W "
